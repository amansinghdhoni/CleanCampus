<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | CleanCampus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="sidebar"></nav>

<main>
    <header>
        <div>
            <h1 id="greet">Campus Dashboard</h1>
            <p id="user-display">Loading...</p>
        </div>
        <img src="https://www.india.gov.in/sites/upload_files/npi/files/logo_0.png" height="50">
    </header>

    <div class="gov-banner">
        <div>
            <h2 style="margin:0;">Swachh Bharat Mission</h2>
            <p>Ek Kadam Swachhata Ki Ore</p>
        </div>
    </div>

    <div class="grid">
        <div class="card" style="border-left: 5px solid var(--primary);">
            <h3>Cleanliness Score</h3>
            <big>88/100</big>
        </div>
        <div class="card" style="border-left: 5px solid var(--secondary);">
            <h3>Waste Diversion</h3>
            <big>1,240 kg</big>
        </div>
        <div class="card" style="border-left: 5px solid #f59e0b;">
            <h3>Carbon Offset</h3>
            <big>420 kg</big>
        </div>
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
